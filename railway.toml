[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "python -c \"import os; port=os.environ.get('PORT','8000'); import uvicorn; uvicorn.run('backend.main:app',host='0.0.0.0',port=int(port))\""
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
